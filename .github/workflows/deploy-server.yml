name: Deploy Server (ECR + ECS)

# ⚠️ 골격(skeleton) — 실 배포 리소스 발급 전까지 비활성 상태.
# 활성화 절차(리소스 발급 후):
#   1) AWS OIDC role / ECR repo / ECS cluster·service 생성
#   2) repo secret: AWS_DEPLOY_ROLE_ARN
#   3) repo variable: DEPLOY_ENABLED=true, (필요시) AWS_REGION·ECR_REPOSITORY override
#   4) deploy/ecs-task-definition.json 의 REPLACE_* 값 채우기
#   5) 자동 배포 원하면 아래 on: 에 push(main)/tag 트리거 추가
on:
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2 # placeholder — vars.AWS_REGION 으로 override 가능
  ECR_REPOSITORY: yummpi-server # placeholder

jobs:
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    # DEPLOY_ENABLED=true 가 등록되기 전까지 skip (골격 안전장치)
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      id-token: write # OIDC role assume
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Compute image ref
        id: meta
        run: echo "image=${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY || env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY || env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ecs:
    name: Deploy to ECS (Fargate)
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      # task 정의 템플릿(deploy/ecs-task-definition.json)의 image 자리에 새 이미지 주입
      - name: Render task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/ecs-task-definition.json
          container-name: yummpi-server
          image: ${{ needs.build-push.outputs.image }}

      # 새 revision 등록 + 서비스 롤아웃. 안정화까지 대기(실패 시 자동 롤백은 ECS 배포 서킷브레이커로 별도 설정).
      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: yummpi-server # placeholder — vars.ECS_SERVICE
          cluster: yummpi # placeholder — vars.ECS_CLUSTER
          wait-for-service-stability: true
