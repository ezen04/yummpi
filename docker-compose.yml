# GatherFlow 로컬 인프라 — ⑤ 인프라·공통 셋업
# PostgreSQL 17 + Redis 8 (Socket.io adapter · BullMQ 공용)
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gatherflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatherflow}
      POSTGRES_DB: ${POSTGRES_DB:-gatherflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gatherflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
